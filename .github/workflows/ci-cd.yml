name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint
        run: make lint

  test:
    runs-on: ubuntu-latest
    env:
      API_KEY: ci-test-key
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: make test

  integration-test:
    needs: [lint, test]
    runs-on: ubuntu-latest
    env:
      API_KEY: ci-test-key
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create .env file
        run: cp .env.example .env && sed -i 's/^API_KEY=.*/API_KEY=ci-test-key/' .env

      - name: Run integration tests
        run: make integration-test

  build:
    needs: [lint, test, integration-test]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        run: docker build -f api/Dockerfile -t devops-monitor-api .

      - name: Build Dashboard image
        run: docker build -f dashboard/Dockerfile -t devops-monitor-dashboard .
